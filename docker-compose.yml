services:
  # Сервис 1: База данных (PostgreSQL)
  db:
    image: postgres:15-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data # Чтобы данные не исчезли при перезагрузке
    env_file:
      - .env

  # Сервис 2: Ваш бэкенд (Django)
  backend:
    build: ./backend # Строить из папки backend
    restart: always
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./backend:/app # ВАЖНО: Это связывает папку на вашем ПК с папкой в Docker. Меняете код тут -> меняется там.
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000" # Открыть порт 8000 наружу
    env_file:
      - .env
    depends_on:
      - db # Запускать только после того, как база стартанет

  # 3. ВЕБ-СЕРВЕР (NGINX) - ГЛАВНЫЙ ВХОД
  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80" # Открываем порт 80 для всего мира
    volumes:
      # Подключаем ваш конфиг (убедитесь, что файл nginx.conf лежит рядом с docker-compose.yml)
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf

      # Подключаем собранный Vue (папка dist должна лежать рядом с docker-compose.yml)
      # Если у вас папка называется frontend/dist, поменяйте путь слева!
      - ./frontend/dist:/app/frontend_dist

      # Подключаем статику, которую нагенерировал Django
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - backend

volumes:
  postgres_data:
  static_volume:
  media_volume:
